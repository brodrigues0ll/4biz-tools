services:
  app:
    build: .
    ports:
      - "4418:3000"
    env_file:
      - .env.prod
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  cron:
    build:
      context: .
      dockerfile: Dockerfile.cron
    environment:
      - MONGODB_URI=mongodb://mongo:27017/create-ticket
      - TZ=America/Sao_Paulo
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:4.4.5
    ports:
      - "28018:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo_data:
